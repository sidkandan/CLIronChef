# Pre-commit hooks for CLIronChef.
#
# Setup:
#   pip install pre-commit
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#
# Runs automatically on every `git commit`; pytest also runs before push.
# Manual runs:
#   pre-commit run --all-files
#   pre-commit run --hook-stage pre-push --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=200]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: public-leak-scan
        name: Public release leak scan
        language: system
        pass_filenames: false
        entry: bash scripts/leak_scan.sh

      - id: pytest-on-pre-push
        name: Run pytest before push
        language: system
        pass_filenames: false
        stages: [pre-push]
        entry: python -m pytest -q
